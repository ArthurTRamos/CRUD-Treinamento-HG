<div class="page">
    <div class="container">
        @if (visualizationMode === 'main') {
            <h1>Contatos</h1>

            <div class="search-button">
                <div class="search">
                    <span>Buscar Contato por Nome</span>
                    <input type="text">
                </div>
                <button class="new-contact-btn" (click)="visualizationMode = 'create'">+ Novo Contato</button>
            </div>
        }

        <app-contact-box
            [visualizationMode]="visualizationMode"
            (visualizationModeChange)="setVisualizationMode($event)">
        </app-contact-box>

    </div>
</div>
